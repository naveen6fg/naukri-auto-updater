name: Naukri Profile Auto-Updater

on:
  schedule:
    - cron: "30 4 * * *"    # 10:00 AM IST
    - cron: "30 15 * * *"   #  9:00 PM IST
  workflow_dispatch:

jobs:
  update-profile:
    name: Update Naukri Profile
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome + matching ChromeDriver
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version
          chromedriver --version

      - name: Install Python dependencies
        run: pip install selenium==4.21.0

      - name: Run Naukri updater
        env:
          NAUKRI_EMAIL:    ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri_updater.py

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-failure-screenshot
          path: login_failed.png
          retention-days: 3

      - name: Commit toggle state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toggle_state.txt
          git diff --staged --quiet || git commit -m "chore: update toggle state [skip ci]"
          git push
